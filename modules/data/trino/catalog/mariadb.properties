# ── MariaDB / MySQL catalog ───────────────────────────────────────────────────
# Conecta a mariadb-infra. Si el contenedor no está levantado, este catálogo
# dará error de conexión pero Trino seguirá funcionando.
# Uso: SELECT * FROM mariadb.nombre_db.tabla
connector.name=mariadb
connection-url=jdbc:mariadb://mariadb-infra:3306
connection-user=admin
connection-password=admin123
