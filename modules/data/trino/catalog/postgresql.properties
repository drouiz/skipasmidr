# ── PostgreSQL catalog ────────────────────────────────────────────────────────
# Conecta a postgres-infra (todas las DBs visibles como schemas).
# Uso: SELECT * FROM postgresql.nombre_db.tabla
connector.name=postgresql
connection-url=jdbc:postgresql://postgres-infra:5432
connection-user=admin
connection-password=admin123

# Habilita push-down de predicados para mejor rendimiento
postgresql.array-mapping=AS_ARRAY
