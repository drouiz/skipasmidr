# ── MongoDB catalog ───────────────────────────────────────────────────────────
# Conecta a mongodb-infra. Las colecciones se exponen como tablas.
# El schema se infiere automáticamente o se define en _schema collection.
# Uso: SELECT * FROM mongodb.nombre_db.coleccion
connector.name=mongodb
mongodb.connection-url=mongodb://mongodb-infra:27017
mongodb.schema-collection=_schema
mongodb.case-insensitive-name-matching=true
