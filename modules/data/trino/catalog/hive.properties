# ── Hive catalog (ad-hoc sobre MinIO) ────────────────────────────────────────
# Lectura directa de ficheros Parquet/ORC/CSV en MinIO sin necesidad de
# registro previo de tablas. Metastore en disco local del contenedor.
# Uso: SELECT * FROM hive.bucket.ruta
connector.name=hive

hive.metastore=file
hive.metastore.catalog.dir=/data/trino/hive-metastore

# MinIO como backend S3
fs.native-s3.enabled=true
s3.endpoint=http://minio-infra:9000
s3.path-style-access=true
s3.aws-access-key=admin
s3.aws-secret-key=admin123456
s3.region=us-east-1

hive.non-managed-table-writes-enabled=true
hive.s3select-pushdown.enabled=false
