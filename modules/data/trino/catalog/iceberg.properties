# ── Iceberg catalog via Nessie ───────────────────────────────────────────────
# Tablas Iceberg gestionadas por Nessie (git-like catalog).
# Storage: MinIO bucket trino-warehouse.
# Uso: SELECT * FROM iceberg.schema.tabla
connector.name=iceberg

iceberg.catalog.type=nessie
iceberg.nessie.uri=http://nessie-infra:19120/api/v2
iceberg.nessie.default-reference-name=main

# MinIO como backend S3
fs.native-s3.enabled=true
s3.endpoint=http://minio-infra:9000
s3.path-style-access=true
s3.aws-access-key=admin
s3.aws-secret-key=admin123456
s3.region=us-east-1

iceberg.register-table-procedure.enabled=true
iceberg.write-table-statistics-enabled=true
