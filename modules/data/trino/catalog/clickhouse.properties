# ── ClickHouse catalog ────────────────────────────────────────────────────────
# Conecta a clickhouse-infra. Si no está levantado, este catálogo dará
# error pero Trino seguirá funcionando con el resto.
# Uso: SELECT * FROM clickhouse.nombre_db.tabla
connector.name=clickhouse
connection-url=jdbc:clickhouse://clickhouse-infra:8123
connection-user=admin
connection-password=admin123

# Permite escrituras desde Trino a ClickHouse
clickhouse.map-string-as-varchar=true
