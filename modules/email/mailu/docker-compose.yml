# Mailu reemplazado por MailPit para entorno de desarrollo
# MailPit: SMTP testing tool con web UI
# - Captura todos los emails enviados
# - Web UI para ver los emails
# - API REST para automatizacion
# Para Mailu completo en produccion: https://setup.mailu.io

services:
  mailpit:
    image: axllent/mailpit:${MAILPIT_VERSION:-latest}
    container_name: mailu-infra
    restart: unless-stopped
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailu.rule=Host(`mail.127.0.0.1.traefik.me`)"
      - "traefik.http.routers.mailu.entrypoints=web"
      - "traefik.http.services.mailu.loadbalancer.server.port=8025"
    networks:
      - infra-network

networks:
  infra-network:
    external: true
