# AsyncAPI Studio - Editor visual para APIs asincronas
# Soporta: WebSockets, MQTT, Kafka, AMQP, etc.

services:
  asyncapi:
    image: asyncapi/studio:${ASYNCAPI_VERSION:-latest}
    container_name: asyncapi-infra
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.asyncapi.rule=Host(`asyncapi.127.0.0.1.traefik.me`)"
      - "traefik.http.routers.asyncapi.entrypoints=web"
      - "traefik.http.services.asyncapi.loadbalancer.server.port=80"
    networks:
      - infra-network

networks:
  infra-network:
    external: true
